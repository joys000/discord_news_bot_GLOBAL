name: 해외뉴스

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:      # 이 줄이 있어야 'Run workflow' 버튼이 생깁니다!

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Libraries
        run: pip install feedparser requests
      - name: Run Python script
        env:
          NEWSBOTG: ${{ secrets.NEWSBOTG }}
        run: python discord_news.py
      - name: Update Memory
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_links.txt
          # 변경사항이 있을 때만 커밋
          git commit -m "Update memory [skip ci]" || echo "No changes"
          # 충돌 방지를 위해 서버 데이터를 먼저 가져옴
          git pull --rebase origin main
          # 안전하게 푸시
          git push origin main
